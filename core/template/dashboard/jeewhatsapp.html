<div class="jwa" id="jwa-#eqLogic_id#">

  <!-- HEADER style WhatsApp -->
  <div class="jwa-hdr">
    <img class="jwa-avatar" src="#avatar_url#" alt="">
    <div class="jwa-hdr-txt">
      <a href="#eqLink#" class="jwa-name" title="Configurer cet équipement">#device_name#</a>
      <span class="jwa-status jwa-st-#status_class#">
        <span class="jwa-dot"></span><span class="jwa-stlabel">#status_label#</span>
      </span>
    </div>
    <span class="jwa-icon jwa-mute" id="jwa-mute-#eqLogic_id#" title="Mettre en sourdine 8 h">
      <i class="fas fa-bell-slash"></i>
    </span>
  </div>

  <!-- ZONE DE CHAT (fond beige WhatsApp) -->
  <div class="jwa-chat" id="jwa-chat-#eqLogic_id#"></div>

  <!-- COMPTEURS -->
  <div class="jwa-stats">
    <span title="Messages reçus aujourd'hui"><i class="fas fa-inbox"></i> <b>#messages_today#</b> reçus</span>
    <span title="Messages envoyés (heure en cours)"><i class="fas fa-paper-plane"></i> <b>#sent_hour#</b> envoyés</span>
  </div>

  <!-- ZONE D'ENVOI RAPIDE -->
  <div class="jwa-input">
    <button class="jwa-mic" id="jwa-mic-#eqLogic_id#" title="Mode vocal : envoyer le texte en note vocale (TTS)">
      <i class="fas fa-microphone"></i>
    </button>
    <input type="text" id="jwa-msg-#eqLogic_id#" placeholder="Écrire un message…" maxlength="1000" autocomplete="off">
    <button class="jwa-send" id="jwa-send-#eqLogic_id#" title="Envoyer dans le groupe">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <script>
  try { (function () {
    // CSS injectée une seule fois
    if (!document.getElementById('jwa-css')) {
      var lnk = document.createElement('link');
      lnk.id = 'jwa-css'; lnk.rel = 'stylesheet'; lnk.type = 'text/css';
      lnk.href = 'plugins/jeewhatsapp/desktop/css/jeewhatsapp.css?v=20260529';
      document.head.appendChild(lnk);
    }

    var EQ = '#eqLogic_id#';
    if (!EQ || EQ.indexOf('#') !== -1) { return; }

    var hasMsg   = ('#has_message#' === '1');
    var lastMsg  = #msg_js#;
    var sender   = #sender_js#;
    var lastTime = #time_js#;
    var attPath  = #att_path_js#;
    var history  = #history_js#;

    var chat = document.getElementById('jwa-chat-' + EQ);

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function nowHM() {
      var d = new Date();
      return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }
    function prettyKind(v) {
      switch (v) {
        case '[audio]':    return '🎤 Note vocale';
        case '[image]':    return '🖼️ Image';
        case '[video]':    return '🎬 Vidéo';
        case '[document]': return '📎 Document';
        case '[sticker]':  return '🏷️ Sticker';
        default:           return v;
      }
    }
    function isKindTag(v) { return /^\[(image|video|audio|document|sticker)\]$/.test(String(v)); }

    // Type de média déduit de l'extension (robuste, indépendant de l'ordre des updates)
    function typeFromPath(p) {
      var ext = (String(p).split('.').pop() || '').toLowerCase();
      if (['jpg', 'jpeg', 'png', 'gif', 'webp'].indexOf(ext) >= 0) { return 'image'; }
      if (['ogg', 'opus', 'mp3', 'm4a', 'aac', 'wav'].indexOf(ext) >= 0) { return 'audio'; }
      if (['mp4', '3gp', 'mov', 'mkv', 'webm'].indexOf(ext) >= 0) { return 'video'; }
      return 'document';
    }
    function mediaUrl(p) {
      return 'plugins/jeewhatsapp/core/ajax/jeewhatsapp.ajax.php?action=getMedia&eqLogic_id='
        + encodeURIComponent(EQ) + '&path=' + encodeURIComponent(p);
    }
    function mediaInner(type, p) {
      var u = mediaUrl(p);
      if (type === 'image')    { return '<img class="jwa-media" src="' + u + '" alt="image" loading="lazy">'; }
      if (type === 'video')    { return '<video class="jwa-media" controls preload="metadata" src="' + u + '"></video>'; }
      if (type === 'audio')    { return '<audio class="jwa-audio" controls preload="none" src="' + u + '"></audio>'; }
      return '<a class="jwa-doc" href="' + u + '" target="_blank" rel="noopener"><i class="fas fa-file-arrow-down"></i> Document</a>';
    }

    // Bulle texte
    function bubble(dir, name, text, time, pending) {
      var who = (dir === 'in' && name) ? '<div class="jwa-bname">' + esc(name) + '</div>' : '';
      var meta = '<span class="jwa-btime">' + esc(time || '') +
        (dir === 'out' ? ' <i class="fas fa-check' + (pending ? '' : '-double') + ' jwa-tick"></i>' : '') +
        '</span>';
      return '<div class="jwa-bubble jwa-' + dir + '">' + who +
        '<div class="jwa-btxt">' + esc(text) + '</div>' + meta + '</div>';
    }
    // Bulle média entrante
    function appendMedia(type, p, name, time) {
      if (!chat) { return; }
      var em = chat.querySelector('.jwa-empty'); if (em) { chat.innerHTML = ''; }
      var who = name ? '<div class="jwa-bname">' + esc(name) + '</div>' : '';
      var meta = '<span class="jwa-btime">' + esc(time || '') + '</span>';
      chat.insertAdjacentHTML('beforeend',
        '<div class="jwa-bubble jwa-in jwa-mediab">' + who + mediaInner(type, p) + meta + '</div>');
      chat.scrollTop = chat.scrollHeight;
    }

    var curSender = sender, curTime = lastTime;
    var lastShownKey = '';

    // ── Rendu initial depuis l'historique ──────────────────────────────
    if (chat) {
      if (history && history.length > 0) {
        var html = '';
        history.forEach(function (m) {
          if (m.dir === 'out') {
            html += bubble('out', '', m.text, m.time, false);
          } else {
            html += bubble('in', m.sender, prettyKind(m.text), m.time, false);
          }
        });
        chat.innerHTML = html;
        // Trouver le dernier message entrant pour initialiser lastShownKey
        // et éviter de l'afficher en double lors de la prochaine mise à jour live
        for (var _i = history.length - 1; _i >= 0; _i--) {
          if (history[_i].dir === 'in') {
            lastShownKey = prettyKind(history[_i].text) + '|' + history[_i].time;
            break;
          }
        }
      } else if (hasMsg && isKindTag(lastMsg) && attPath) {
        lastShownKey = 'ATT|' + attPath;
        appendMedia(typeFromPath(attPath), attPath, sender, lastTime);
      } else if (hasMsg) {
        lastShownKey = prettyKind(lastMsg) + '|' + lastTime;
        chat.innerHTML = bubble('in', sender, prettyKind(lastMsg), lastTime, false);
      } else {
        chat.innerHTML = '<div class="jwa-empty"><i class="fab fa-whatsapp"></i><br>Aucun message reçu</div>';
      }
      chat.scrollTop = chat.scrollHeight;
    }

    // Ajoute une bulle texte entrante (les médias passent par appendMedia)
    function appendIncoming(text) {
      text = String(text == null ? '' : text);
      if (isKindTag(text)) { return; } // média : géré par last_attachment_path
      text = prettyKind(text);
      var key = text + '|' + curTime;
      if (text === '' || key === lastShownKey) { return; }
      lastShownKey = key;
      if (chat) {
        var em = chat.querySelector('.jwa-empty'); if (em) { chat.innerHTML = ''; }
        chat.insertAdjacentHTML('beforeend', bubble('in', curSender, text, curTime, false));
        chat.scrollTop = chat.scrollHeight;
      }
    }

    // ── Mise à jour live (jeedom.cmd.addUpdateFunction) ─────────────────
    if (window.jeedom && jeedom.cmd && jeedom.cmd.addUpdateFunction) {
      var jval = function (p) { return (p.display_value != null ? p.display_value : p.value); };
      function bindUpd(id, fn) { if (id !== '0') { jeedom.cmd.addUpdateFunction(id, fn); } }
      bindUpd('#info_profile_id#', function (p) { var v = jval(p); if (v) { curSender = v; } });
      bindUpd('#info_sender_id#',  function (p) { var v = jval(p); if (v && ('#info_profile_id#' === '0')) { curSender = v; } });
      bindUpd('#info_time_id#',    function (p) {
        var t = Date.parse(String(jval(p)).replace(' ', 'T'));
        if (!isNaN(t)) { var d = new Date(t); curTime = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2); }
      });
      // Nouveau média reçu → bulle image/audio/vidéo/document
      bindUpd('#info_att_path_id#', function (p) {
        var path = jval(p);
        if (!path) { return; }
        var key = 'ATT|' + path;
        if (key === lastShownKey) { return; }
        lastShownKey = key;
        appendMedia(typeFromPath(path), path, curSender, curTime);
      });
      // Nouveau message texte / transcription STT réinjectée → bulle texte
      bindUpd('#info_msg_id#', function (p) { appendIncoming(jval(p)); });
    }

    var input   = document.getElementById('jwa-msg-' + EQ);
    var sendBtn = document.getElementById('jwa-send-' + EQ);
    var micBtn  = document.getElementById('jwa-mic-' + EQ);
    var hasVoice  = ('#cmd_voice_id#' !== '0');
    // Enregistrement micro possible uniquement en contexte sécurisé (HTTPS/localhost)
    var canRecord = !!(window.isSecureContext && navigator.mediaDevices &&
                       navigator.mediaDevices.getUserMedia && window.MediaRecorder);
    var voiceMode = false; // mode TTS (repli quand l'enregistrement n'est pas dispo)

    // Ajoute une bulle "envoyée" optimiste, renvoie l'élément
    function outBubble(text) {
      if (!chat) { return null; }
      if (chat.querySelector('.jwa-empty')) { chat.innerHTML = ''; }
      chat.insertAdjacentHTML('beforeend', bubble('out', '', text, nowHM(), true));
      chat.scrollTop = chat.scrollHeight;
      return chat.lastElementChild;
    }
    function markBubble(el, ok) {
      if (!el) { return; }
      var t = el.querySelector('.jwa-tick');
      if (t) { t.className = ok ? 'fas fa-check-double jwa-tick' : 'fas fa-times jwa-tick'; }
      if (!ok) { el.classList.add('jwa-failed'); }
    }

    // ── Envoi texte / TTS ───────────────────────────────────────────────
    function doSend() {
      var useVoice = voiceMode && hasVoice;
      var cmdId = useVoice ? '#cmd_voice_id#' : '#cmd_send_id#';
      if (cmdId === '0') { return; }
      var txt = (input.value || '').trim();
      if (txt === '') { return; }
      input.value = '';
      input.disabled = true;
      var last = outBubble(useVoice ? '🎤 ' + txt : txt);
      jeedom.cmd.execute({
        id: cmdId,
        value: { message: txt, title: '' },
        success: function () { input.disabled = false; input.focus(); markBubble(last, true); },
        error:   function () { input.disabled = false; markBubble(last, false); }
      });
    }
    if (sendBtn) { sendBtn.addEventListener('click', doSend); }
    if (input) {
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); doSend(); }
      });
    }

    // ── Bouton micro : enregistreur si possible, sinon bascule TTS ───────
    if (micBtn) {
      if (canRecord) {
        // Mode ENREGISTREUR : clic = démarrer, clic = arrêter + envoyer
        micBtn.title = 'Enregistrer une note vocale (clic pour démarrer/arrêter)';
        var rec = null, chunks = [], recording = false, stream = null;
        micBtn.addEventListener('click', function () {
          if (recording) { try { rec.stop(); } catch (e) {} return; }
          navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
            stream = s; chunks = [];
            rec = new MediaRecorder(s);
            rec.ondataavailable = function (e) { if (e.data && e.data.size) { chunks.push(e.data); } };
            rec.onstop = function () {
              recording = false; micBtn.classList.remove('jwa-rec');
              if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); }
              var blob = new Blob(chunks, { type: (rec.mimeType || 'audio/webm') });
              if (!blob.size) { return; }
              var last = outBubble('🎤 Note vocale');
              var fd = new FormData();
              fd.append('action', 'uploadVoice');
              fd.append('eqLogic_id', EQ);
              fd.append('audio', blob, 'rec.webm');
              fetch('plugins/jeewhatsapp/core/ajax/jeewhatsapp.ajax.php', {
                method: 'POST', body: fd, credentials: 'same-origin'
              }).then(function (r) { return r.json(); })
                .then(function (d) { markBubble(last, !!(d && d.state === 'ok')); })
                .catch(function () { markBubble(last, false); });
            };
            rec.start(); recording = true; micBtn.classList.add('jwa-rec');
          }).catch(function () {
            if (input) {
              var ph = input.placeholder;
              input.placeholder = 'Micro refusé ou indisponible';
              setTimeout(function () { input.placeholder = ph; }, 2500);
            }
          });
        });
      } else if (hasVoice) {
        // Repli MODE TTS (contexte non sécurisé) : icône haut-parleur
        var ico = micBtn.querySelector('i'); if (ico) { ico.className = 'fas fa-volume-up'; }
        micBtn.title = 'Mode vocal TTS : le texte tapé est envoyé en note vocale synthétisée';
        micBtn.addEventListener('click', function () {
          voiceMode = !voiceMode;
          micBtn.classList.toggle('jwa-active', voiceMode);
          if (input) { input.placeholder = voiceMode ? 'Texte à dire (note vocale)…' : 'Écrire un message…'; }
        });
      } else {
        micBtn.style.display = 'none';
      }
    }

    // ── Sourdine ────────────────────────────────────────────────────────
    var muteBtn = document.getElementById('jwa-mute-' + EQ);
    if (muteBtn) {
      muteBtn.addEventListener('click', function () {
        if ('#cmd_mute_id#' === '0') { return; }
        muteBtn.classList.add('jwa-busy');
        jeedom.cmd.execute({
          id: '#cmd_mute_id#',
          value: { title: '' },
          success: function () { muteBtn.classList.remove('jwa-busy'); muteBtn.classList.add('jwa-active'); },
          error:   function () { muteBtn.classList.remove('jwa-busy'); }
        });
      });
    }
  })(); } catch (e) { /* widget JeeWhatsApp : erreur non bloquante */ }
  </script>
</div>
